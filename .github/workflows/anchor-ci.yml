name: Anchor CI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'keygen (program ID) | wallet (deploy wallet) | deploy'
        required: true
        default: 'deploy'
        type: choice
        options: [keygen, wallet, deploy]
      cluster:
        description: 'Cluster for deploy mode'
        required: false
        default: 'devnet'
        type: choice
        options: [devnet, mainnet-beta]
  push:
    branches: [main]

jobs:
  keygen:
    if: github.event.inputs.mode == 'keygen'
    runs-on: ubuntu-latest
    steps:
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Generate program keypair
        run: |
          solana-keygen new --no-bip39-passphrase -s -o program-keypair.json
          echo "Program ID: $(solana-keygen pubkey program-keypair.json)"
      - uses: actions/upload-artifact@v4
        with:
          name: program-keypair
          path: program-keypair.json

  wallet:
    if: github.event.inputs.mode == 'wallet'
    runs-on: ubuntu-latest
    steps:
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Generate deploy wallet
        run: |
          solana-keygen new --no-bip39-passphrase -s -o deploy-wallet.json
          echo "Wallet address: $(solana-keygen pubkey deploy-wallet.json)"
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-wallet
          path: deploy-wallet.json

  build-and-deploy:
    if: github.event.inputs.mode == 'deploy' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Install Anchor
        run: |
          cargo install anchor-cli --version 0.30.1 --force
      - name: Restore program keypair
        run: |
          mkdir -p target/deploy
          echo '${{ secrets.SOLANA_PROGRAM_KEYPAIR }}' > target/deploy/chatfi_escrow-keypair.json
      - name: Build
        run: anchor build
      - name: Deploy
        if: github.event.inputs.mode == 'deploy'
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url https://api.${{ github.event.inputs.cluster }}.solana.com
          solana program deploy target/deploy/chatfi_escrow.so --program-id target/deploy/chatfi_escrow-keypair.json --keypair ~/.config/solana/id.json
      - uses: actions/upload-artifact@v4
        with:
          name: chatfi-escrow-build
          path: |
            target/deploy/*.so
            target/idl/*.json

  test-devnet:
    if: github.event_name == 'push'
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Install Anchor
        run: |
          cargo install anchor-cli --version 0.30.1 --force
      - name: Install JS deps
        run: yarn install --frozen-lockfile || yarn install
      - name: Restore program keypair
        run: |
          mkdir -p target/deploy
          echo '${{ secrets.SOLANA_PROGRAM_KEYPAIR }}' > target/deploy/chatfi_escrow-keypair.json
      - name: Configure devnet wallet
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url https://api.devnet.solana.com --keypair ~/.config/solana/id.json
      - name: Run devnet test suite
        run: anchor test --skip-local-validator --skip-deploy --skip-build
